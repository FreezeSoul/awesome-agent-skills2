name: Search Index

on:
  pull_request:
    paths:
      - 'README.md'
      - 'README_ZH.md'
      - 'docs/index.html'
      - 'scripts/sync-search-index.js'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'README_ZH.md'
      - 'docs/index.html'
      - 'scripts/sync-search-index.js'
      - 'package.json'
  workflow_dispatch:

jobs:
  search-index:
    name: Sync search index
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate search index
        run: npm run sync:search

      - name: Check generated index on pull requests
        if: github.event_name == 'pull_request'
        run: |
          test -s docs/skills.json
          git diff -- docs/skills.json

      - name: Commit generated index on main
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet docs/skills.json; then
            echo "Search index already up to date."
            exit 0
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/skills.json
          git commit -m "chore: sync search index [skip ci]"
          git push
